spring.application.name=easyPal-backEnd
server.port=8080

# MySQL（库名与建表脚本一致：soulmate）
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/soulmate?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus
mybatis-plus.type-aliases-package=com.qimo.easypalbackend.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# JWT（生产环境务必改为长随机串，且不少于 32 字符）
easypal.jwt.secret=EasyPalDevJwtSecretKeyChangeMeInProd123456
easypal.jwt.expire-hours=168

# 短信验证码：true 时在日志打印验证码（不接真实短信时用）
easypal.sms.log-code=true

# 讯飞流式语音识别（实时 ASR）
easypal.speech.xfyun.enabled=false
